# The realtime full-stack to-do app (proposal/transport-rpc.md, phase 6): a
# browser `client`, a Node `server`, and a shared `common` library holding the
# wire type and the `[service(TodoClient)]` service the two sides meet at. The
# list lives on the server (persisted to `todos.json`); every connected session
# observes it over SSE (`std::rpc`'s SplitDuplex), so an edit in one tab appears
# in all of them.
#
#   vilan build .   compiles each app into `dist/` (`client.js` / `server.js`)
#   vilan run .     builds both and starts the Node server
[project]
packages = ["common", "client", "server"]
