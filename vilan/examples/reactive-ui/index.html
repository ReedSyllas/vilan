<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Vilan reactive UI</title>
		<style>
			body { font: 16px/1.5 system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; }
			section { margin-block: 2rem; }
			button { margin-right: 0.25rem; }
			.todos .row { display: flex; gap: 0.5rem; }
			.todos ul { list-style: none; padding: 0; }
			.todos li { display: flex; gap: 0.5rem; align-items: center; }
			.todos li.done span { text-decoration: line-through; opacity: 0.5; }
			.todos .remove { margin-left: auto; }
			.todos .filters .active { font-weight: bold; }
			.todos .empty { opacity: 0.6; }
		</style>
	</head>
	<body>
		<!-- The client mounts each component into its own node by id. -->
		<div id="counter"></div>
		<div id="todos"></div>
		<!-- Build with `vilan build --target browser app.vl`, which emits app.js
		     next to it — an ES module (DOM globals, no Node imports). -->
		<script type="module" src="app.js"></script>
	</body>
</html>
