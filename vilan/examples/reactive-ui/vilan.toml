# A browser client built on the `std::ui` reactive layer. `app.vl` is the entry;
# it mounts the `counter` component. As a `browser`-target package, a plain
# `vilan build .` (or `vilan build`) emits `app.js` next to it — no `--target`
# needed. Sources sit at the package root, so `root` is `.`.
[package]
name = "reactive_ui"
root = "."
entry = "app.vl"
target = "browser"
