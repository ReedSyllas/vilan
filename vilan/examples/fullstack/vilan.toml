# A full-stack project as a multi-package workspace. Each member has its own
# `vilan.toml` and target; `common` (a pure `target = "none"` library) is shared
# by both apps via `import common::greeting`.
#
#   vilan build .   compiles each app for its target into `dist/`
#                   (`dist/server.js` for Node, `dist/client.js` for the browser)
#   vilan run .     builds both and starts the Node server, which serves the
#                   client bundle (the workspace's single `node` member is run)
[project]
packages = ["common", "client", "server"]
