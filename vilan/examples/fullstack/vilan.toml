name = "fullstack"

# A full-stack project: a Node server and a browser client, both written in
# Vilan. `vilan build` compiles each for its own target into `dist/`
# (`dist/server.js` for Node, `dist/client.js` for the browser); `vilan run`
# builds both and starts the server, which serves the client bundle.
[server]
entry = "server.vl"

[client]
entry = "client.vl"

# Code-generation options. `preset` ("debug" — the default — or "release")
# initializes every option; individual keys then override it. The knobs:
#   indent       lay out across lines with indentation (vs one flat line)
#   spaces       pad tokens — `a + b`, `[ 1, 2 ]` (vs tight `a+b`, `[1,2]`)
#   debug-names  annotate identifiers with their source name (`a/*name*/`)
# Debug turns all on; release turns all off.
# [build]
# preset = "release"
# debug-names = true   # e.g. minified but still annotated, for profiling
